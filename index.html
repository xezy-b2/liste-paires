<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registre — Restock - Google Spreadsheets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>

  * { box-sizing: border-box; }
  :root { 
  --paper: #F5F1E8;
  --paper-raised: #FCFAF5;
  --ink: #262220;
  --ink-soft: #6B6459;
  --line: #D9D2C3;
  --stamp-red: #9A3324;
  --stamp-gray: #837A6D;
  --focus: #2F5D50;
 }
  body {
    background: var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(38,34,32,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--ink);
    font-family: 'Inter', Arial, sans-serif;
    margin: 0;
    padding: 40px 24px 80px;
    line-height: 1.5;
  }
  a { color: var(--focus); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: clamp(28px, 4vw, 38px);
    margin: 6px 0 10px;
    letter-spacing: -0.01em;
  }
  .source {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 32px;
    word-break: break-all;
  }
  .source a { color: var(--ink-soft); text-decoration-color: var(--line); }
  .stamp {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border: 1.5px solid currentColor;
    border-radius: 3px 7px 4px 6px;
    white-space: nowrap;
  }
  .stamp-changed { color: var(--stamp-red); transform: rotate(-3deg); }
  .stamp-unchanged { color: var(--stamp-gray); transform: rotate(2deg); }

  .count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin: 32px 0 12px;
  }
  ol.ledger { list-style: none; margin: 0; padding: 0; }
  li.entry {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 14px 4px;
    border-bottom: 1px dashed var(--line);
  }
  li.entry:first-child { border-top: 1px dashed var(--line); }
  .entry-no {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    min-width: 42px;
  }
  .entry-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13.5px;
    white-space: nowrap;
  }
  .leader { flex: 1; border-bottom: 1px dotted var(--line); margin-bottom: 4px; min-width: 16px; }
  .entry-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    text-decoration: none;
    color: var(--focus);
    white-space: nowrap;
  }
  .entry-link:hover { text-decoration: underline; }
  .empty { color: var(--ink-soft); font-size: 14px; padding: 24px 0; }
</style>
</head>
<body>
  <div class="wrap">
    <span class="eyebrow">Journal d'archives</span>
    <h1>Restock - Google Spreadsheets</h1>
    <p class="source">Source : <a href="https://docs.google.com/spreadsheets/d/14u-hKRykbn3DGSg5oic9kYMYxEwoiOW4OoSY1_osueY">https://docs.google.com/spreadsheets/d/14u-hKRykbn3DGSg5oic9kYMYxEwoiOW4OoSY1_osueY</a></p>
    <p class="count">2 archives consignées</p>
    <ol class="ledger"><li class="entry">
        <span class="entry-no">N°2</span>
        <span class="entry-date">16 juillet 2026</span>
        <span class="leader"></span>
        <span class="stamp stamp-unchanged">Inchangé</span>
        <a class="entry-link" href="entries/2026-07-16.html">Voir →</a>
      </li>
<li class="entry">
        <span class="entry-no">N°1</span>
        <span class="entry-date">15 juillet 2026</span>
        <span class="leader"></span>
        <span class="stamp stamp-unchanged">Inchangé</span>
        <a class="entry-link" href="entries/2026-07-15.html">Voir →</a>
      </li></ol>
  </div>
</body>
</html>
